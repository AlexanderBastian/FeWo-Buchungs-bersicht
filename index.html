<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeWo Buchungsübersicht – Jungferweiher</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b141a;
            color: #e9edef;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            font-size: 1.4em;
            margin-bottom: 8px;
            color: #00a884;
        }
        .subtitle {
            color: #8696a0;
            font-size: 0.9em;
            margin-bottom: 24px;
        }
        .card {
            background: #1f2c34;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 640px;
            margin-bottom: 16px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #00a884;
            color: #111b21;
        }
        .btn-primary:hover { background: #06cf9c; }
        .btn-primary:disabled {
            background: #2a3942;
            color: #8696a0;
            cursor: not-allowed;
        }
        .btn-whatsapp {
            background: #25d366;
            color: #111b21;
        }
        .btn-whatsapp:hover { background: #2eea77; }
        .btn-copy {
            background: #2a3942;
            color: #e9edef;
            border: 1px solid #3b4a54;
        }
        .btn-copy:hover { background: #3b4a54; }
        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        #output {
            background: #111b21;
            border: 1px solid #2a3942;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            white-space: pre-wrap;
            font-family: inherit;
            font-size: 0.92em;
            line-height: 1.6;
            max-height: 500px;
            overflow-y: auto;
            display: none;
        }
        .status {
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.88em;
            margin-top: 12px;
            display: none;
        }
        .status.success { display: block; background: #0d3320; color: #06cf9c; }
        .status.error { display: block; background: #3b1c1c; color: #ef4444; }
        .status.loading { display: block; background: #1a2e35; color: #00a884; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #00a884;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .info {
            color: #8696a0;
            font-size: 0.82em;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <h1>📅 FeWo Buchungsübersicht</h1>
    <p class="subtitle">Jungferweiher – Automatische Übersicht aus Smoobu</p>

    <div class="card">
        <button class="btn btn-primary" id="btnFetch" onclick="fetchBookings()">
            📥 Buchungen abrufen
        </button>
        <div id="status" class="status"></div>
        <div id="output"></div>
        <div class="btn-row" id="actionButtons" style="display:none;">
            <button class="btn btn-whatsapp" onclick="openWhatsApp()">
                💬 In WhatsApp öffnen
            </button>
            <button class="btn btn-copy" onclick="copyText()">
                📋 Text kopieren
            </button>
        </div>
        <p class="info" id="infoText"></p>
    </div>

<script>
const ICAL_URL = 'https://login.smoobu.com/ical/detail/1319981.ics?s=JK5kHolSnw';
const WHATSAPP_GROUP = 'https://chat.whatsapp.com/FlPb1LcW8hG';
const DAYS_FUTURE = 60;
const PROXIES = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?',
    'https://api.codetabs.com/v1/proxy?quest='
];

const MONTHS = ['','Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const MONTHS_SHORT = ['','Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const DAYS_SHORT = ['So','Mo','Di','Mi','Do','Fr','Sa'];

let generatedText = '';

function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.className = 'status ' + type;
    el.innerHTML = (type === 'loading' ? '<span class="spinner"></span>' : '') + msg;
}

async function fetchIcal() {
    try {
        const r = await fetch(ICAL_URL);
        if (r.ok) return await r.text();
    } catch(e) {}
    for (const proxy of PROXIES) {
        try {
            const r = await fetch(proxy + encodeURIComponent(ICAL_URL));
            if (r.ok) {
                const t = await r.text();
                if (t.includes('BEGIN:VCALENDAR')) return t;
            }
        } catch(e) {}
    }
    throw new Error('Alle Verbindungsversuche fehlgeschlagen.');
}

function parseDate(s) {
    return new Date(+s.substr(0,4), +s.substr(4,2)-1, +s.substr(6,2));
}

function fmtD(d) {
    return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0');
}

function fmtDM(d) {
    return fmtD(d) + ' ' + MONTHS_SHORT[d.getMonth()+1];
}

function dayName(d) { return DAYS_SHORT[d.getDay()]; }

function addDays(d, n) {
    const r = new Date(d);
    r.setDate(r.getDate() + n);
    return r;
}

function parseEvents(ical) {
    const events = ical.split('BEGIN:VEVENT');
    const bookings = [];
    for (let i = 1; i < events.length; i++) {
        const ev = events[i];
        if (!ev.includes('DTSTART;VALUE=DATE:')) continue;
        const dsM = ev.match(/DTSTART;VALUE=DATE:(\\d{8})/);
        const deM = ev.match(/DTEND;VALUE=DATE:(\\d{8})/);
        const sumM = ev.match(/SUMMARY:(.*?)(?:\\r?\\n(?! ))/s);
        const descM = ev.match(/DESCRIPTION:(.*?)(?:\\r?\\n[A-Z])/s);
        if (!dsM) continue;
        const start = parseDate(dsM[1]);
        const end = deM ? parseDate(deM[1]) : addDays(start, 1);
        const summary = sumM ? sumM[1].trim().replace(/\\\\,/g,',').replace(/\\r/g,'').replace(/\\n /g,'') : '';
        const desc = descM ? descM[1].trim().replace(/\\\\,/g,',').replace(/\\r/g,'').replace(/\\n /g,'') : '';
        bookings.push({ start, end, summary, desc });
    }
    return bookings;
}

function extractName(b) {
    const { summary, desc } = b;
    if (desc.includes('Auto-Blocked') || summary.includes('Auto-Blocked')) return null;
    let name = summary.replace(/,?\\s*Jungferweiher\\s*$/i, '').trim();
    if (/^block\\s*/i.test(name)) {
        const rem = name.replace(/^block\\s*/i, '').trim();
        if (!rem || rem === ',') return null;
        name = rem;
    }
    if (!name || name.toLowerCase() === 'jungferweiher') return null;
    const blockWords = ['blocked','blockiert','nicht verfügbar','unavailable','closed','gesperrt','maintenance','hold'];
    if (blockWords.includes(name.toLowerCase())) return null;
    return name;
}

function getCleaningDays(checkout, nextCheckin) {
    const days = [];
    if (nextCheckin && checkout >= nextCheckin) return days;
    days.push('– ' + dayName(checkout) + ' ' + fmtD(checkout) + ' ab 12:00 Uhr');
    let current = addDays(checkout, 1);
    let added = 0;
    let maxSearch = 10;
    while (added < 2 && maxSearch-- > 0) {
        if (nextCheckin && current > nextCheckin) break;
        if (nextCheckin && current.getTime() === nextCheckin.getTime()) {
            days.push('– ' + dayName(current) + ' ' + fmtD(current) + ' bis 12:00 Uhr ⚠️ Achtung Anreise');
            added++;
            break;
        }
        if (current.getDay() >= 1 && current.getDay() <= 5) {
            days.push('– ' + dayName(current) + ' ' + fmtD(current));
            added++;
        }
        current = addDays(current, 1);
    }
    return days;
}

function generateOverview(bookings) {
    const today = new Date();
    today.setHours(0,0,0,0);
    const futureLimit = addDays(today, DAYS_FUTURE);
    const allNamed = [];
    for (const b of bookings) {
        const name = extractName(b);
        if (!name) continue;
        const dep = addDays(b.end, -1);
        allNamed.push({ start: b.start, dep, name });
    }
    allNamed.sort((a,b) => a.start - b.start);
    let lastPast = null;
    for (const b of allNamed) {
        if (b.dep < today) lastPast = b;
    }
    const valid = [];
    if (lastPast) valid.push(lastPast);
    for (const b of allNamed) {
        if (b === lastPast) continue;
        if (b.dep < today) continue;
        if (b.start > futureLimit) continue;
        valid.push(b);
    }
    if (!valid.length) return 'Keine Buchungen im Zeitraum gefunden.';
    const lastIdx = lastPast ? 0 : null;
    const lines = [];
    let curMonth = null;
    for (let i = 0; i < valid.length; i++) {
        const b = valid[i];
        const mKey = b.start.getFullYear() * 100 + b.start.getMonth();
        if (mKey !== curMonth) {
            curMonth = mKey;
            if (lines.length) lines.push('');
            lines.push('*' + MONTHS[b.start.getMonth()+1] + ' ' + b.start.getFullYear() + '*');
        }
        const dateStr = b.start.getMonth() === b.dep.getMonth()
            ? '*' + fmtD(b.start) + ' – ' + fmtD(b.dep) + '*'
            : '*' + fmtDM(b.start) + ' – ' + fmtDM(b.dep) + '*';
        lines.push(dateStr);
        let nameLine = b.name + ' - 2 Per';
        if (i === lastIdx) nameLine += ' ← letzte Buchung';
        lines.push(nameLine);
        if (b.name.toLowerCase().includes('benedikt') && b.name.toLowerCase().includes('junk')) {
            lines.push('⚠️ keine Duftspender aufstellen');
        }
        const nextCheckin = (i + 1 < valid.length) ? valid[i+1].start : null;
        const cleaning = getCleaningDays(b.dep, nextCheckin);
        if (cleaning.length) {
            lines.push('🧹 Reinigung möglich');
            for (const c of cleaning) lines.push(c);
        }
        lines.push('');
    }
    return lines.join('\n').trim();
}

async function fetchBookings() {
    const btn = document.getElementById('btnFetch');
    btn.disabled = true;
    setStatus('Buchungen werden geladen...', 'loading');
    document.getElementById('output').style.display = 'none';
    document.getElementById('actionButtons').style.display = 'none';
    try {
        const ical = await fetchIcal();
        const bookings = parseEvents(ical);
        generatedText = generateOverview(bookings);
        document.getElementById('output').textContent = generatedText;
        document.getElementById('output').style.display = 'block';
        document.getElementById('actionButtons').style.display = 'flex';
        setStatus('✅ ' + bookings.filter(b => extractName(b)).length + ' Buchungen geladen – Stand: ' + new Date().toLocaleDateString('de-DE'), 'success');
        document.getElementById('infoText').textContent = 'Zeitraum: letzte Buchung + 60 Tage ab heute';
    } catch(e) {
        setStatus('❌ Fehler: ' + e.message, 'error');
    }
    btn.disabled = false;
}

function openWhatsApp() {
    navigator.clipboard.writeText(generatedText).then(() => {
        window.open(WHATSAPP_GROUP, '_blank');
        setStatus('📋 Text kopiert! In WhatsApp einfügen mit Strg+V', 'success');
    }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = generatedText;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        window.open(WHATSAPP_GROUP, '_blank');
        setStatus('📋 Text kopiert! In WhatsApp einfügen mit Strg+V', 'success');
    });
}

function copyText() {
    navigator.clipboard.writeText(generatedText).then(() => {
        setStatus('📋 Text in Zwischenablage kopiert!', 'success');
    }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = generatedText;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        setStatus('📋 Text in Zwischenablage kopiert!', 'success');
    });
}
</script>
</body>
</html>
